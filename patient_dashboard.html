<!DOCTYPE html>
<html>

<head>
    <title>Patient Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            /* 🔥 Professional Background */
            background: url("https://images.unsplash.com/photo-1579684385127-1ef15d508118") no-repeat center center/cover;
        }
        /* 🔥 SIDEBAR */
        
        .sidebar {
            position: fixed;
            width: 230px;
            height: 100%;
            background: rgba(47, 64, 83, 0.9);
            backdrop-filter: blur(8px);
            padding: 20px;
            color: white;
        }
        
        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            transition: 0.3s;
        }
        
        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.2);
            padding-left: 10px;
        }
        /* 🔥 MAIN AREA */
        
        .main {
            margin-left: 250px;
            padding: 40px;
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            color: white;
            position: relative;
        }
        
        h1 {
            color: white;
        }
        /* 🔥 CARDS */
        
        .cards {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 40px;
            width: 220px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }
        
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        /* 🔥 FORM */
        
        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
            outline: none;
        }
        
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #2f4053;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1f2d3d;
        }
        /* 🔥 TABLE */
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
        }
        
        th,
        td {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
    </style>

    <script>
        const API = "https://unpreventible-ernest-contributively.ngrok-free.dev";

        let currentPatient = "";

        window.onload = function() {

            currentPatient = localStorage.getItem("patientName");

            if (!currentPatient) {
                currentPatient = "Ripon Saha";
                localStorage.setItem("patientName", currentPatient);
            }

            document.getElementById("pDisplay").innerText = currentPatient;

            updateDashboard();
        };

        function showPage(page) {
            ["dashboard", "book", "appointments"].forEach(id => {
                document.getElementById(id).style.display = "none";
            });

            document.getElementById(page).style.display = "block";

            if (page === "appointments") loadAppointments();
        }

        function selectDoctor() {
            const disease = document.getElementById("disease").value;
            const doctor = document.getElementById("doctor");

            const doctorMap = {
                "Heart": "Dr. Smith (Cardiologist)",
                "Teeth": "Dr. John (Dentist)",
                "Brain": "Dr. David (Neurologist)",
                "Skin": "Dr. Alex (Dermatologist)",
                "Eye": "Dr. Priya (Ophthalmologist)",
                "Bone": "Dr. Kumar (Orthopedic)",
                "Lungs": "Dr. Khan (Pulmonologist)",
                "Kidney": "Dr. Mehta (Nephrologist)",
                "Liver": "Dr. Roy (Hepatologist)",
                "Stomach": "Dr. Das (Gastroenterologist)",
                "General": "Dr. Sharma (General Physician)"
            };

            doctor.value = doctorMap[disease] || "";
        }

        async function saveAppointment(e) {
            e.preventDefault();

            const age = document.getElementById("age").value;
            const disease = document.getElementById("disease").value;
            const doctor = document.getElementById("doctor").value;
            const date = document.getElementById("date").value;

            if (!age || !disease || !doctor || !date) {
                alert("⚠️ Please fill all fields");
                return;
            }

            try {
                const res = await fetch(API + "/appointments/book", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        patient: currentPatient,
                        age,
                        disease,
                        doctor,
                        date
                    })
                });

                const data = await res.json();

                // 🔥 HANDLE SERVER ERROR
                if (data.error) {
                    alert("❌ " + data.error);
                    return;
                }

                alert("✅ Appointment Booked Successfully!");

                document.getElementById("bookForm").reset();
                updateDashboard();

            } catch (error) {
                console.error(error);
                alert("❌ Server not reachable (Check ngrok / backend)");
            }
        }

        function loadAppointments() {
            const patient = localStorage.getItem("patientName");

            fetch(API + "/appointments/patient/" + encodeURIComponent(patient))
                .then(res => res.json())
                .then(data => {

                    const table = document.getElementById("table");
                    table.innerHTML = "";

                    const today = new Date();
                    today.setHours(0, 0, 0, 0);

                    const validAppointments = data.filter(a => {
                        const appDate = new Date(a.date);
                        return appDate >= today;
                    });

                    if (validAppointments.length === 0) {
                        table.innerHTML = "<tr><td colspan='5'>No Upcoming Appointments</td></tr>";
                        return;
                    }

                    validAppointments.forEach(a => {
                        table.innerHTML += `
                        <tr>
                            <td>${a.patient}</td>
                            <td>${a.doctor}</td>
                            <td>${a.date}</td>
                            <td>${a.time || "-"}</td>
                            <td>${a.status}</td>
                        </tr>`;
                    });
                });
        }

        async function updateDashboard() {
            const res = await fetch(API + "/appointments/patient/" + encodeURIComponent(currentPatient));
            const data = await res.json();

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const validAppointments = data.filter(a => {
                const appDate = new Date(a.date);
                return appDate >= today;
            });

            document.getElementById("count").innerText = validAppointments.length;
        }

        function logout() {
            localStorage.removeItem("patientName");
        }
    </script>

</head>

<body>

    <div class="sidebar">
        <h2>Patient Panel</h2>

        <a href="#" onclick="showPage('dashboard')">Dashboard</a>
        <a href="#" onclick="showPage('book')">Book Appointment</a>
        <a href="#" onclick="showPage('appointments')">My Appointments</a>
        <a href="dashboard.html" onclick="logout()">Logout</a>
    </div>

    <div class="main">

        <p style="position:absolute;top:20px;right:40px;">
            👤 <b id="pDisplay"></b>
        </p>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <h1>Patient Dashboard</h1>

            <div class="cards">
                <div class="card">
                    <h3>Appointments</h3>
                    <p id="count">0</p>
                </div>
            </div>
        </div>

        <!-- BOOK -->
        <div id="book" style="display:none;">
            <h1>Book Appointment</h1>

            <form id="bookForm" onsubmit="saveAppointment(event)">

                <label>Age</label><br>
                <input type="number" id="age" style="width:200px;" required>

                <br><br>

                <label>Disease</label><br>
                <select id="disease" onchange="selectDoctor()" style="width:200px;" required>
            <option value="">Select</option>
            <option value="Heart">Heart</option>
            <option value="Teeth">Teeth</option>
            <option value="Brain">Brain</option>
            <option value="Skin">Skin</option>
            <option value="Eye">Eye</option>
            <option value="Bone">Bone</option>
            <option value="Lungs">Lungs</option>
            <option value="Kidney">Kidney</option>
            <option value="Liver">Liver</option>
            <option value="Stomach">Stomach</option>
            <option value="General">General</option>
        </select>

                <br><br>

                <label>Doctor</label><br>
                <input type="text" id="doctor" style="width:200px;" readonly>

                <br><br>

                <label>Date</label><br>
                <input type="date" id="date" style="width:200px;" required>

                <br><br>

                <button type="submit">Book</button>

            </form>
        </div>

        <!-- APPOINTMENTS -->
        <div id="appointments" style="display:none;">
            <h1>My Appointments</h1>

            <table>
                <tr>
                    <th>Patient</th>
                    <th>Doctor</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
                <tbody id="table"></tbody>
            </table>
        </div>

    </div>

</body>

</html>

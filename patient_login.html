<!DOCTYPE html>
<html>

<head>
    <title>Patient Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            /* 🔥 Professional Hospital Wallpaper */
            background: url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3") no-repeat center center/cover;
            height: 100vh;
        }
        /* 🔥 DARK OVERLAY */
        
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 🔥 GLASS LOGIN BOX */
        
        .login-box {
            width: 350px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        label {
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            outline: none;
        }
        /* 🔥 BUTTON */
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2f4053;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #1f2d3d;
        }
    </style>

    <script>
        function sendOTP() {

            var phone = document.getElementById("phone").value;

            if (phone !== "1234567890") {
                alert("Only registered number allowed: 1234567890");
                return;
            }

            var otp = Math.floor(1000 + Math.random() * 9000);
            sessionStorage.setItem("otp", otp);

            alert("OTP sent: " + otp);
        }

        function patientLogin() {

            var name = document.getElementById("name").value;
            var phone = document.getElementById("phone").value;
            var enteredOTP = document.getElementById("otp").value;
            var storedOTP = sessionStorage.getItem("otp");

            if (name === "" || phone === "" || enteredOTP === "") {
                alert("All fields required");
                return;
            }

            if (enteredOTP == storedOTP) {
                localStorage.setItem("patientName", name);
                sessionStorage.removeItem("otp");
                window.location.href = "patient_dashboard.html";
            } else {
                alert("Invalid OTP");
            }
        }
    </script>

</head>

<body>

    <div class="overlay">

        <div class="login-box">

            <h2>Patient Login</h2>

            <label>Name</label>
            <input type="text" id="name" placeholder="Enter Name">

            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter Phone Number">

            <button onclick="sendOTP()">Send OTP</button>

            <label>Enter OTP</label>
            <input type="text" id="otp" placeholder="Enter OTP">

            <button onclick="patientLogin()">Login</button>

        </div>

    </div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            /* 🔥 PROFESSIONAL WALLPAPER */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(20, 40, 60, 0.7)), url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }
        /* 🔥 GLASS LOGIN BOX */
        
        .login-box {
            width: 350px;
            margin: 120px auto;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            color: white;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        label {
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            outline: none;
        }
        /* 🔥 BUTTON */
        
        button {
            width: 100%;
            padding: 12px;
            background: #00bcd4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        
        button:hover {
            background: #0097a7;
        }
    </style>

    <script>
        function adminLogin() {

            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            // 🔥 Simple login check
            if (email === "admin258@gmail.com" && password === "1234") {

                // ✅ Save login
                localStorage.setItem("adminEmail", email);

                // ✅ Redirect
                window.location.href = "admin_dashboard.html";

            } else {
                alert("Invalid Email or Password");
            }
        }
    </script>

</head>

<body>

    <div class="login-box">

        <h2>Admin Login</h2>

        <!-- Email -->
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter Email" required>

        <!-- Password -->
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password" required>

        <!-- Button -->
        <button onclick="adminLogin()">Login</button>

    </div>

</body>

</html>
